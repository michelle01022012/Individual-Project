
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Detailed Movie Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
      <form class="search-form" id="searchForm">
        <div class="logo">Movie Search</div>
        <div class="search-form_input">
          <input
            class="search-form__input"
            type="text"
            id="searchInput"
            placeholder="Search for a Movie..."
            required
          />
          <button class="search-form__button" type="submit">Search</button>
        </div>
      </form>
      <figure>
        <img
          src="./Movies.png"
          alt="Movie Search banner"
          class="banner-image"
        />
      </figure>
    </nav>
  <main>
    <div class="controls">
      <p id="resultsInfo">Showing: Movies</p>
      <div>
        <label for="sortSelect">Sort:</label>
        <select id="sortSelect">
          <option value="default">Default</option>
          <option value="a-z">A - Z</option>
          <option value="z-a">Z - A</option>
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
        </select>
      </div>
    </div>

    <div class="movies-grid" id="moviesGrid"></div>
  </main>

  <footer>
    <p>Created by - Michelle Anderson (2026).  Powered by OMDBapi.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
